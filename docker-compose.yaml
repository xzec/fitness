services:

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    volumes:
      - pg-data:/var/lib/postgresql
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness_app
    ports:
      - '5432:5432'

volumes:
  pg-data: